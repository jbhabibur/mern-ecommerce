services:
  # Backend Server: Node.js/Express application
  server:
    build:
      context: ./server
      dockerfile: Dockerfile.dev
    ports:
      - "5000:5000" # Map host port 5000 to container port 5000
    volumes:
      # Enable hot-reloading by syncing local source code to container
      - ./server:/app
      # Anonymous volume to preserve container's node_modules
      - /app/node_modules
    env_file:
      - ./server/.env

  # User Frontend: React/Vite application for customers
  client:
    build:
      context: ./client
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173" # Map host port 5173 to container port 5173
    volumes:
      - ./client:/app
      - /app/node_modules
    env_file:
      - ./client/.env

  # Admin Panel: React/Vite application for management
  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile.dev
    ports:
      - "5174:5174" # Map host port 5174 to container port 5174
    volumes:
      - ./admin:/app
      - /app/node_modules
    env_file:
      - ./admin/.env
